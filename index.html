<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON-HOST | دخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', Tahoma, sans-serif;
        }

        :root {
            --primary-blue: #4A90E2;
            --pure-white: #FFFFFF;
            --light-gray: #F5F7FA;
            --text-dark: #2C3E50;
            --border-light: #E1E8ED;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
        }

        .login-card {
            background: var(--pure-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(74, 144, 226, 0.2);
            padding: 50px 40px;
            border: 1px solid var(--border-light);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            color: var(--primary-blue);
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: var(--light-gray);
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: var(--pure-white);
        }

        .login-btn {
            width: 100%;
            background: var(--primary-blue);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }

        .admin-hint {
            margin-top: 30px;
            padding: 20px;
            background: var(--light-gray);
            border-radius: 12px;
            border: 1px dashed var(--primary-blue);
            text-align: center;
        }

        .admin-hint strong {
            color: var(--primary-blue);
        }

        #alertMessage {
            color: #E74C3C;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>DRAGON-HOST</h1>
            </div>

            <div id="alertMessage"></div>

            <div class="input-group">
                <label class="input-label">👤 اسم المستخدم</label>
                <input type="text" class="input-field" id="username" value="DragonMaster">
            </div>

            <div class="input-group">
                <label class="input-label">🔑 كلمة المرور</label>
                <input type="password" class="input-field" id="password" value="Dragon@Host2026">
            </div>

            <button class="login-btn" onclick="login()">تسجيل الدخول</button>

            <div class="admin-hint">
                <strong>بيانات الدخول الافتراضية:</strong><br>
                المستخدم: DragonMaster<br>
                كلمة المرور: Dragon@Host2026
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');

            alertDiv.style.display = 'none';

            try {
                const response = await fetch('/.netlify/functions/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    alertDiv.style.display = 'block';
                    alertDiv.textContent = data.message || 'خطأ في تسجيل الدخول';
                }
            } catch (error) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'خطأ في الاتصال بالخادم';
            }
        }
    </script>
</body>
              </html>
